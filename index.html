<!DOCTYPE html>
<html lang="es" class="m-0 p-0 box-border">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/66b6826106.js" crossorigin="anonymous"></script>
    <script src="src/storage.js" defer></script>
    <script src="src/state.js" defer></script>
    <script src="src/reminders.js" defer></script>
    <script src="src/ui.js" defer></script>
    <script src="src/main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>My TaskFlow</title>
</head>

<body class="min-h-screen flex flex-col items-center font-['Roboto'] text-slate-100 bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-950">
    <header class="justify-around px-6 py-10 md:p-20 md:pb-8">
        <h1 class="text-5xl">My TaskFlow</h1>
    </header>
    <div class="w-full max-w-6xl px-6 md:px-12 py-8 flex flex-col lg:flex-row lg:items-start gap-10">
        <div class="w-full lg:w-1/2 max-w-[520px]">
            <h2 class="text-2xl">Mis tareas</h2>
            <div class="m-4 ml-0 w-full flex flex-wrap gap-2">
                <button data-filter="all" class="bot_filtro [@media(max-width:1130px)]:text-[12px] bg-[rgb(34,_173,_46)]  text-[white] font-semibold hover:bg-[rgb(90,_90,_90)] hover:cursor-pointer mr-2 p-[0.7rem] pr-6 pl-6 min-w-[100px] border-none rounded-[20px] text-[16px]">Todas</button>
                <button data-filter="pending" class="bot_filtro [@media(max-width:1130px)]:text-[12px] bg-[rgb(51,_51,_51)] text-[white] font-semibold hover:bg-[rgb(90,_90,_90)] hover:cursor-pointer mr-2 p-[0.7rem] pr-6 pl-6 min-w-[100px] border-none rounded-[20px] text-[16px]">Pendientes</button>
                <button data-filter="completed" class="bot_filtro [@media(max-width:1130px)]:text-[12px] bg-[rgb(51,_51,_51)] text-[white] font-semibold hover:bg-[rgb(90,_90,_90)] hover:cursor-pointer mr-2 p-[0.7rem] pr-6 pl-6 min-w-[100px] border-none rounded-[20px] text-[16px]">Completadas</button>
            </div>
            <div class="extra flex flex-col sm:flex-row gap-2 sm:gap-3 sm:justify-start">
                <button class="w-full sm:w-auto hover:cursor-pointer bg-[blue] hover:bg-[rgb(69,_69,_255)] text-[white] font-semibold p-[0.7rem] pr-6 pl-6 min-w-[100px] border-none rounded-[20px] text-[16px]" id="complete">Completar todas</button>
                <button class="w-full sm:w-auto hover:cursor-pointer bg-[red] hover:bg-[rgb(255,_91,_91)] text-[white] font-semibold p-[0.7rem] pr-6 pl-6 min-w-[100px] border-none rounded-[20px] text-[16px]" id="wipe">Eliminar completadas</button>
            </div>
            <form id="form_tarea" class="m-4 ml-0">
                <div class="flex gap-2 items-center">
                    <input class="bg-white/90 text-slate-900 placeholder:text-slate-500 border-none [border-bottom:solid] border p-[0.4rem] w-[85%] text-[16px] rounded-[10px]" id="input_tarea" type="text" placeholder="Añade una nueva tarea">
                    <button type="submit" class="bg-[rgb(51,_51,_51)] text-[white] font-semibold hover:bg-[rgb(90,_90,_90)] hover:cursor-pointer p-2 pr-[0.7rem] pl-[0.7rem] border-none rounded-[12px] min-w-[40px] min-h-[40px] text-[18px]">
                    <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div class="mt-3 flex flex-col sm:flex-row gap-2 sm:items-center">
                    <label class="text-sm text-slate-200/90">
                        Fecha límite
                        <input id="due_date" type="date" class="ml-2 bg-white/90 text-slate-900 border border-white/20 p-[0.35rem] rounded-[10px]">
                    </label>
                    <label class="text-sm text-slate-200/90">
                        Recordatorio
                        <input id="reminder_at" type="datetime-local" class="ml-2 bg-white/90 text-slate-900 border border-white/20 p-[0.35rem] rounded-[10px]">
                    </label>
                </div>
            </form>
            <input class="bg-white/90 text-slate-900 placeholder:text-slate-500 border-none [border-bottom:solid] border p-[0.4rem] w-[85%] text-[16px] rounded-[10px]" id="search" type="text" placeholder="Buscar tarea">
            <ul class="Li_tareas [list-style:none]" id="Li_tareas"></ul>

        </div>
        
        <div class="w-full lg:w-1/2 max-w-[520px]">
            <h2 class="text-2xl">Estadísticas</h2>
            <p>Total: <span id="total"></span></p>
            <p>Pendientes: <span id="pendientes"></span></p>
            <p>Completadas: <span id="completadas"></span></p>
            <button id="enable_reminders" class="mt-4 hover:cursor-pointer bg-emerald-600 hover:bg-emerald-500 text-white font-semibold p-[0.7rem] pr-6 pl-6 border-none rounded-[20px] text-[16px]">
                Activar recordatorios
            </button>
        </div>
    </div>
    
    <template id="tarea_template">
        <li class="flex flex-row justify-between w-full p-4 m-4 ml-0 border border-solid rounded-[20px] bg-white/10 border-white/20 backdrop-blur-sm"> 
            <div class="flex flex-col gap-1 flex-1 pr-3">
                <div class="flex items-center">
                    <input class="check mr-[10px] ml-[5px]" type="checkbox">
                    <p class="desc_texto"></p>
                </div>
                <p class="due_text text-xs text-slate-200/80"></p>
            </div>
            <div class="botones_tarea">
                <button aria-label="Editar tarea" class="hover:cursor-pointer border-none ml-2 mr-4 bg-transparent text-slate-100 hover:text-emerald-300 edit"><i class="fa-solid fa-pen-to-square"></i></button>
                <button aria-label="Eliminar tarea" class="hover:cursor-pointer border-none ml-2 mr-4 bg-transparent text-slate-100 hover:text-red-300 delete"><i class="fa-solid fa-x"></i></button>
            </div>
        </li>
    </template>
</body>
</html>
